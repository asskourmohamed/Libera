version: '3.8'

services:
  # ============================================
  # SERVICE MONGODB
  # ============================================
  mongodb:
    image: mongo:7.0
    container_name: libera_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: libera
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - libera_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # SERVICE REDIS (Optionnel - pour le caching)
  # ============================================
  redis:
    image: redis:7.2-alpine
    container_name: libera_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - libera_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ============================================
  # SERVICE MONGO-EXPRESS (Interface Admin Web)
  # ============================================
  mongo-express:
    image: mongo-express:1.0.2
    container_name: libera_mongo_express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin123
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin123@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - libera_network

# ============================================
# VOLUMES PERSISTANTS
# ============================================
volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local

# ============================================
# RÉSEAU
# ============================================
networks:
  libera_network:
    driver: bridge